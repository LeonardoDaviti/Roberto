x:
  exclude:
    - replies
    - retweets
  max_results: 100
  tweet_fields:
    - id
    - text
    - created_at
    - author_id
    - conversation_id
    - entities
    - public_metrics
    - referenced_tweets
  request_timeout_s: 20
  retry:
    max_attempts: 5
    backoff_s: [1, 2, 4, 8, 16]

llm:
  provider: gemini
  model: gemini-3.1-flash
  model_fallbacks:
    - gemini-3.0-flash
    - gemini-2.5-flash
  temperature: 0.2
  max_output_tokens: 4096
  thinking_level: low
  json_mode: true
  retry_max_attempts: 6
  retry_min_backoff_s: 10
  retry_max_backoff_s: 120

notes:
  per_user_note_enabled: true
  digest_note_enabled: true
  note_timezone: Asia/Tbilisi
  overwrite_mode: markers_only

pipeline:
  v1:
    backfill_count: 100
  v2:
    max_new_tweets_per_user: 200
    create_digest_each_run: true

v4:
  retrieval:
    enabled: true
    top_k_user_context: 5
    top_k_story_context: 5
    max_context_chars: 320
  eval:
    enabled: true
    thresholds:
      citation_coverage_min: 0.7
      invalid_citation_rate_max: 0.3
      duplicate_notecard_rate_max: 0.5
      note_churn_max: 0.6
      story_continuity_score_min: 0.5

v6:
  enabled: true
  idea_cards_per_user: 6
  shuffle_weekly_count: 12
  shuffle_connection_count: 3
  conflict_detection_window_days: 30

v7:
  enabled: true
  timeline_default_days: 90
  min_entity_token_len: 3

v13:
  enabled: false
  max_diff_lines: 300

v15:
  enabled: true
  apply_muted_filters: true

v17:
  enabled: true
  prompt_pack_version: v1
  schema_pack_version: v1
  eval:
    enabled: true
    baseline_fixture: null
    contradiction_precision_min: 0.5

v18:
  enabled: true
  top_story_deltas: 5
  top_connections: 3
  top_ideas: 3
  default_mode: fast

v19:
  enabled: true
  keeper_cap_per_story_week: 25
  auto_reject_overflow: true

v21:
  enabled: true
  chapter_count: 3
  cards_per_chapter: 8

v22:
  enabled: true
  doctrine_path: profile/doctrine.md
  tags_path: profile/tags.yaml

v23:
  enabled: true
  default_mode: memo

v24:
  enabled: true
  one_issue_enabled: true

v26:
  enabled: true
  books_dir: Books
  chunk_chars: 6500
  max_chunks_per_book: 12
  cards_per_chunk: 3
